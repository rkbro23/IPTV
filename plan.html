<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Choose Your Plan | RK Premium IPTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f172a;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #f1f5f9;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* Back button */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(225, 29, 72, 0.12);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      color: #e11d48;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.2s;
      margin-bottom: 2rem;
    }
    .back-link:hover {
      background: #e11d48;
      color: white;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.5s ease;
    }
    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #e11d48);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .page-header p {
      color: #94a3b8;
    }
    .portal-badge {
      display: inline-block;
      background: #1e293b;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-size: 0.85rem;
      margin-top: 0.8rem;
      border: 1px solid #334155;
    }
    .portal-badge i {
      color: #e11d48;
      margin-right: 6px;
    }

    /* Plan cards grid */
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0 2rem;
    }

    .plan-card {
      background: #1e293b;
      border-radius: 32px;
      padding: 1.8rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid #334155;
      position: relative;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
      transform: translateY(15px);
    }
    .plan-card:hover {
      transform: translateY(-8px);
      border-color: #e11d48;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.5);
    }
    .popular-badge {
      position: absolute;
      top: -12px;
      right: 20px;
      background: #f59e0b;
      color: #0f172a;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      letter-spacing: 0.5px;
    }
    .plan-duration {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    .device-info {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .price-block {
      margin: 1rem 0;
    }
    .current-price {
      font-size: 2rem;
      font-weight: 800;
      color: #facc15;
    }
    .original-price {
      font-size: 0.9rem;
      color: #64748b;
      text-decoration: line-through;
      margin-left: 8px;
    }
    .save-badge {
      background: #e11d4820;
      color: #e11d48;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      display: inline-block;
      margin-left: 8px;
    }
    .features-list {
      list-style: none;
      margin: 1.2rem 0 1.5rem;
      border-top: 1px solid #334155;
      padding-top: 1rem;
    }
    .features-list li {
      font-size: 0.8rem;
      margin: 0.6rem 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
    }
    .features-list li i {
      color: #e11d48;
      font-size: 0.7rem;
      width: 18px;
    }
    .btn-book {
      background: #e11d48;
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }
    .btn-book:hover {
      background: #be123c;
      transform: scale(0.97);
    }
    .disclaimer {
      background: #0f172a;
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .disclaimer i {
      color: #e11d48;
      margin-right: 6px;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 700px) {
      body {
        padding: 1rem;
      }
      .plan-duration {
        font-size: 1.5rem;
      }
      .current-price {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>

  <div class="page-header">
    <h1>Choose Your Plan</h1>
    <p>Select the perfect subscription for your streaming needs</p>
    <div class="portal-badge" id="portalNameDisplay">
      <i class="fas fa-tv"></i> Loading portal...
    </div>
  </div>

  <div class="plans-grid" id="plansContainer"></div>

  <div class="disclaimer">
    <i class="fas fa-info-circle"></i> 📌 No trial available (MAC-based services) • Instant delivery via Telegram • 24/7 support
  </div>
</div>

<script>
  // Get portal name from URL
  const urlParams = new URLSearchParams(window.location.search);
  let portalName = urlParams.get('portal');
  if (!portalName || portalName === 'null') portalName = "Selected Portal";
  document.getElementById("portalNameDisplay").innerHTML = `<i class="fas fa-tv"></i> ${portalName}`;

  // Plan data: duration, device count, price, original price, savings%, extra features
  const plans = [
    {
      duration: "1 Month",
      device: 1,
      price: 99,
      original: 499,
      popular: false,
      features: ["1 Device Connection", "Global Live Channels", "Movies, VOD & Netflix", "HD | FHD | 4K Quality", "Anti-Freeze Streaming", "Over 9,000+ channels", "Over 39,000+ VODs"]
    },
    {
      duration: "3 Months",
      device: 1,
      price: 199,
      original: 1299,
      popular: true,
      features: ["1 Device Connection", "Global Live Channels", "Movies, VOD & Netflix", "HD | FHD | 4K Quality", "Anti-Freeze Streaming", "Over 9,000+ channels", "Over 39,000+ VODs", "Save 84%"]
    },
    {
      duration: "6 Months",
      device: 1,
      price: 249,
      original: 1999,
      popular: false,
      features: ["1 Device Connection", "Global Live Channels", "Movies, VOD & Netflix", "HD | FHD | 4K Quality", "Anti-Freeze Streaming", "Over 9,000+ channels", "Over 5000+ Series"]
    },
    {
      duration: "12 Months",
      device: 2,
      price: 299,
      original: 3500,
      popular: false,
      features: ["2 Device Connections", "Global Live Channels", "Movies, VOD & Netflix", "HD | FHD | 4K Quality", "Anti-Freeze Streaming", "Over 9,000+ channels", "Over 39,000+ VODs", "Best Value - Save 91%"]
    }
  ];

  function calculateSave(original, price) {
    return Math.round(((original - price) / original) * 100);
  }

  const container = document.getElementById("plansContainer");

  function renderPlans() {
    let html = "";
    plans.forEach(plan => {
      const savePercent = calculateSave(plan.original, plan.price);
      html += `
        <div class="plan-card">
          ${plan.popular ? '<div class="popular-badge">🔥 MOST POPULAR</div>' : ''}
          <div class="plan-duration">${plan.duration}</div>
          <div class="device-info"><i class="fas fa-tv"></i> ${plan.device} Device${plan.device > 1 ? 's' : ''}</div>
          <div class="price-block">
            <span class="current-price">₹${plan.price}</span>
            <span class="original-price">₹${plan.original}</span>
            <span class="save-badge">SAVE ${savePercent}%</span>
          </div>
          <ul class="features-list">
            ${plan.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
          </ul>
          <button class="btn-book" data-plan='${JSON.stringify(plan)}'>
            <i class="fab fa-telegram"></i> Book Instant
          </button>
        </div>
      `;
    });
    container.innerHTML = html;

    // Attach event listeners to all book buttons
    document.querySelectorAll('.btn-book').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const planData = JSON.parse(btn.getAttribute('data-plan'));
        sendToTelegram(planData);
      });
    });
  }

  function sendToTelegram(plan) {
    const deviceText = plan.device === 1 ? "1 Device" : "2 Devices";
    const message = `🛒 *NEW IPTV ORDER*%0A📺 Portal: ${portalName}%0A📆 Plan: ${plan.duration}%0A💻 ${deviceText}%0A💰 Price: ₹${plan.price}%0A✅ Ready for payment and activation.`;
    const tgUrl = `https://t.me/IPTV_AccessBot?text=${message}`;
    window.open(tgUrl, "_blank");
  }

  renderPlans();
</script>
</body>
</html>
