<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Choose Plan | RK Premium IPTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f1c;
      font-family: 'Inter', sans-serif;
      color: #f1f5f9;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 2rem;
      transition: 0.2s;
      padding: 0.5rem 1rem;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .back-link:hover {
      color: #e11d48;
      background: rgba(225, 29, 72, 0.15);
      transform: translateX(-4px);
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .portal-logo-section {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .portal-logo {
      width: 320px;
      height: 180px;
      border-radius: 24px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(225, 29, 72, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      transition: 0.3s ease;
    }

    .portal-logo:hover {
      transform: scale(1.03);
      border-color: #e11d48;
      box-shadow: 0 18px 40px rgba(225, 29, 72, 0.3);
    }

    .portal-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .portal-logo-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #e11d48, #be123c);
      color: white;
      font-size: 3.5rem;
    }

    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #e11d48);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .portal-name {
      background: linear-gradient(135deg, #e11d48, #ff6b8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .page-header p {
      color: #94a3b8;
      font-size: 1rem;
    }

    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }

    .plan-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(51, 65, 85, 0.6);
      border-radius: 28px;
      padding: 2rem 1.5rem;
      position: relative;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .plan-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #e11d48, #be123c);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .plan-card:hover::before {
      transform: scaleX(1);
    }

    .plan-card:hover {
      transform: translateY(-10px);
      border-color: #e11d48;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
      background: rgba(30, 41, 59, 0.95);
    }

    .plan-card.premium {
      border-color: #e11d48;
      background: linear-gradient(180deg, rgba(225, 29, 72, 0.08) 0%, rgba(30, 41, 59, 0.9) 100%);
      box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
    }

    .popular-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #e11d48, #be123c);
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.4rem 1.3rem;
      border-radius: 30px;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(225, 29, 72, 0.4);
      letter-spacing: 0.5px;
    }

    .plan-duration {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 1rem;
    }

    .price-block {
      text-align: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.6);
    }

    .currency {
      font-size: 1.3rem;
      vertical-align: top;
      color: #f43f5e;
      font-weight: 700;
    }

    .current-price {
      font-size: 3.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .save-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      margin-left: 8px;
    }

    .features-list {
      list-style: none;
      margin-bottom: 2rem;
      flex: 1;
    }

    .features-list li {
      font-size: 0.85rem;
      margin: 0.8rem 0;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #cbd5e1;
    }

    .features-list li i {
      color: #10b981;
      font-size: 1rem;
      margin-top: 2px;
    }

    .btn-book {
      background: #334155;
      color: white;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .plan-card.premium .btn-book {
      background: linear-gradient(135deg, #e11d48, #be123c);
      box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);
    }

    .btn-book:hover {
      transform: scale(0.98);
      filter: brightness(1.1);
    }

    @media (max-width: 768px) {
      .plans-grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.2rem;
      }
      .page-header h1 {
        font-size: 2rem;
      }
      .plan-card {
        padding: 1.5rem 1.2rem;
      }
      .current-price {
        font-size: 2.5rem;
      }
      .portal-logo {
        width: 240px;
        height: 135px;
      }
    }

    @media (max-width: 650px) {
      .plans-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .plan-card {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to Store
  </a>

  <div class="page-header">
    <div class="portal-logo-section">
      <div class="portal-logo" id="portalLogoContainer">
        <div id="portalLogoContent">
          <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: #e11d48;"></i>
        </div>
      </div>
    </div>
    <h1>Plans for <span class="portal-name" id="portalTitle">Portal</span></h1>
    <p><i class="fas fa-rocket" style="color: #e11d48;"></i> Select your preferred Monthly Plan • Instant Telegram delivery</p>
  </div>

  <div class="plans-grid" id="plansContainer"></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  let portalName = urlParams.get('portal') || "Selected Portal";
  document.getElementById("portalTitle").innerText = portalName;

  function getBannerImage(portalName) {
    let slug = portalName.toLowerCase()
      .replace(/portal/g, '')
      .replace(/[^a-z0-9]/g, '');
    
    const specialMaps = {
      '4kspicetv': '4kspicetv',
      'newjiotv': 'newjiotv',
      'zee5': 'zee5',
      'plat4k': 'plat4k',
      'alphaott': 'alphaott',
      'iristv': 'iristv',
      'starshare': 'starshare',
      'b1g': 'b1g',
      'dittotv': 'dittotv',
      'true8k': 'true8k',
      'newmaxtv': 'newmaxtv',
      'tvfusion4k': 'tvfusion4k',
      'mainlightott': 'mainlightott',
      'tatatv': 'tatatv',
      'cineplus': 'cineplus',
      'trexlive': 'trexlive',
      'doordarshan': 'doordarshan'
    };
    
    const fileName = specialMaps[slug] || slug;
    return `logos/${fileName}.png`;
  }

  const logoPath = getBannerImage(portalName);
  const logoContainer = document.getElementById("portalLogoContent");
  logoContainer.innerHTML = `
    <img src="${logoPath}" alt="${portalName} logo" 
         style="width:100%; height:100%; object-fit:cover;"
         onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'portal-logo-fallback\\'><i class=\\'fas fa-tv\\'></i></div>';">
  `;

    // 💰 UPDATED PRICING TO SECURE YOUR MARGINS 💰
  const pricingData = {
    "starshare":   { 1: 149, 3: 399, 6: 719, 12: 1199 },
    "zee5":        { 1: 145, 3: 389, 6: 699, 12: 1179 },
    "tatatv":      { 1: 139, 3: 375, 6: 669, 12: 1149 },
    "newjiotv":    { 1: 135, 3: 365, 6: 649, 12: 1129 },
    "true8k":      { 1: 129, 3: 349, 6: 619, 12: 1099 },
    "4kspicetv":   { 1: 125, 3: 339, 6: 599, 12: 1069 },
    "plat4k":      { 1: 119, 3: 319, 6: 569, 12: 1029 },
    "tvfusion4k":  { 1: 115, 3: 309, 6: 549, 12: 999 },
    "b1g":         { 1: 109, 3: 295, 6: 519, 12: 959 },
    "cineplus":    { 1: 105, 3: 285, 6: 499, 12: 929 },
    "iristv":      { 1: 99,  3: 269, 6: 479, 12: 899 },
    "trexlive":    { 1: 95,  3: 259, 6: 459, 12: 869 },
    "newmaxtv":    { 1: 89,  3: 239, 6: 429, 12: 829 },
    "dittotv":     { 1: 85,  3: 229, 6: 409, 12: 799 },
    "alphaott":    { 1: 79,  3: 215, 6: 389, 12: 769 },
    "mainlightott":{ 1: 75,  3: 205, 6: 369, 12: 739 },
    "doordarshan": { 1: 69,  3: 189, 6: 339, 12: 599 }
  };
  

  function getPortalSlug(name) {
    let slug = name.toLowerCase().replace(/portal/g, '').replace(/[^a-z0-9]/g, '');
    const specialMaps = {
      '4kspicetv': '4kspicetv', 'newjiotv': 'newjiotv', 'starshare': 'starshare',
      'b1g': 'b1g', 'zee5': 'zee5', 'plat4k': 'plat4k', 'alphaott': 'alphaott',
      'iristv': 'iristv', 'true8k': 'true8k', 'newmaxtv': 'newmaxtv', 'tvfusion4k': 'tvfusion4k',
      'mainlightott': 'mainlightott', 'tatatv': 'tatatv', 'cineplus': 'cineplus',
      'trexlive': 'trexlive', 'doordarshan': 'doordarshan', 'dittotv': 'dittotv'
    };
    return specialMaps[slug] || slug;
  }

  const slug = getPortalSlug(portalName);
  const prices = pricingData[slug] || { 1: 109, 3: 295, 6: 519, 12: 759 };

  const plans = [
    {
      duration: "1 Month",
      price: prices[1],
      premium: false,
      popular: false,
      saveAmount: null,
      features: [
        "📺 1 Device Connection (MAC Locked)",
        "🎬 HD (720p/1080p) Quality",
        "📡 Full Channel Access (depends on portal)",
        "🎞️ Basic VOD Library",
        "💬 Standard Telegram Support",
        "⚡ Regular Streaming"
      ]
    },
    {
      duration: "3 Months",
      price: prices[3],
      premium: false,
      popular: false,
      saveAmount: prices[3] < prices[1] * 3 ? `Save ₹${(prices[1] * 3) - prices[3]}` : null,
      features: [
        "📺 1 Device Connection (MAC Locked)",
        "🎬 Full HD 1080p Quality",
        "📡 Full Channel Access (depends on portal)",
        "🎞️ Full VOD + Series (2500+)",
        "💬 Priority Telegram Support",
        "🛡️ Anti-Freeze Lite Technology",
        "🚫 Catch-up Not Available"
      ]
    },
    {
      duration: "6 Months",
      price: prices[6],
      premium: true,
      popular: true,
      saveAmount: prices[6] < prices[1] * 6 ? `Save ₹${(prices[1] * 6) - prices[6]}` : null,
      features: [
        "📺 1 Device Connection (MAC Locked)",
        "🎬 4K Ultra HD Quality",
        "📡 Full Channel Access (depends on portal)",
        "🎞️ Premium VOD + Series",
        "🚫 Catch-up Not Available",
        "🛡️ Premium Anti-Freeze",
        "⚡ Priority 24/7 WhatsApp Support"
      ]
    },
    {
      duration: "12 Months",
      price: prices[12],
      premium: true,
      popular: false,
      saveAmount: prices[12] < prices[1] * 12 ? `Save ₹${(prices[1] * 12) - prices[12]}` : null,
      features: [
        "📺 1 Device Connection (MAC Locked)",
        "🎬 4K Ready Streams",
        "📡 Full Channel Access (depends on portal)",
        "🎞️ Ultimate VOD",
        "🚫 Catch-up Not Available",
        "🛡️ Zero-Buffering Technology",
        "👑 Lifetime Support",
        "🔄 Free Automatic Updates"
      ]
    }
  ];

  const container = document.getElementById("plansContainer");
  let html = "";
  
  plans.forEach((plan, index) => {
    const delay = index * 0.1;
    html += `
      <div class="plan-card ${plan.premium ? 'premium' : ''}" style="animation-delay: ${delay}s">
        ${plan.popular ? '<div class="popular-badge">🔥 MOST POPULAR</div>' : ''}
        <div class="plan-duration">${plan.duration}</div>
        <div class="price-block">
          <span class="currency">₹</span>
          <span class="current-price">${plan.price}</span>
          ${plan.saveAmount ? `<span class="save-badge">${plan.saveAmount}</span>` : ''}
        </div>
        <ul class="features-list">
          ${plan.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
        </ul>
        <button class="btn-book" onclick="sendToTelegram('${plan.duration}', ${plan.price})">
          <i class="fab fa-telegram"></i> Select Plan
        </button>
      </div>
    `;
  });
  
  container.innerHTML = html;

  // ========== MODIFIED FUNCTION – Redirects to checkout.html ==========
  function sendToTelegram(duration, price) {
    // Encode parameters to safely pass to checkout page
    const encodedPortal = encodeURIComponent(portalName);
    const encodedPlan = encodeURIComponent(duration);
    // Price is numeric, no need to encode, but we pass as is
    const checkoutUrl = `checkout.html?portal=${encodedPortal}&plan=${encodedPlan}&price=${price}`;
    // Redirect current page to the secure checkout flow
    window.location.href = checkoutUrl;
  }
 </script>

    setInterval(function() {
      console.clear();

</script>
</body>
</html>
