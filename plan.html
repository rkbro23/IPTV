<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Choose Plan | RK Premium IPTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1c; font-family: 'Inter', sans-serif; color: #f1f5f9; padding: 2rem 1rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: #94a3b8; text-decoration: none; font-weight: 600;
      margin-bottom: 2rem; transition: 0.2s;
    }
    .back-link:hover { color: #e11d48; }

    .page-header { text-align: center; margin-bottom: 3rem; }
    .page-header h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .portal-name { color: #e11d48; }

    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .plan-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 24px;
      padding: 2rem 1.5rem; position: relative; transition: 0.3s;
      display: flex; flex-direction: column;
    }
    .plan-card:hover { transform: translateY(-10px); border-color: #e11d48; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .plan-card.premium { border-color: #e11d48; background: linear-gradient(180deg, rgba(225,29,72,0.05) 0%, #1e293b 100%); }
    
    .popular-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: #e11d48; color: white; font-size: 0.75rem; font-weight: 800;
      padding: 0.4rem 1.2rem; border-radius: 20px; white-space: nowrap;
    }

    .plan-duration { font-size: 1.5rem; font-weight: 800; color: #fff; text-align: center; margin-bottom: 1rem; }
    
    .price-block { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #334155; }
    .currency { font-size: 1.2rem; vertical-align: top; color: #f43f5e; font-weight: 700; }
    .current-price { font-size: 3rem; font-weight: 900; color: #fff; line-height: 1; }
    
    .features-list { list-style: none; margin-bottom: 2rem; flex: 1; }
    .features-list li { font-size: 0.85rem; margin: 0.8rem 0; display: flex; align-items: flex-start; gap: 10px; color: #cbd5e1; }
    .features-list li i { color: #10b981; font-size: 1rem; margin-top: 2px; }

    .btn-book {
      background: #334155; color: white; width: 100%; padding: 1rem;
      border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: 0.3s;
    }
    .plan-card.premium .btn-book { background: #e11d48; }
    .btn-book:hover { background: #f43f5e; transform: scale(0.98); }

    @media (max-width: 600px) {
      .page-header h1 { font-size: 2rem; }
      .plans-grid { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>

  <div class="page-header">
    <h1>Plans for <span class="portal-name" id="portalTitle">Portal</span></h1>
    <p style="color: #94a3b8;">Select your preferred duration. Instant delivery guaranteed.</p>
  </div>

  <div class="plans-grid" id="plansContainer"></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  let portalName = urlParams.get('portal') || "Selected Portal";
  document.getElementById("portalTitle").innerText = portalName;

  // DYNAMIC PRICING LOGIC
  // Define custom prices for specific portals (All under 150)
  const pricingData = {
    "starshare": { 1: 59, 3: 89, 6: 119, 12: 149 },
    "b1g": { 1: 49, 3: 79, 6: 109, 12: 139 },
    "4kspicetv": { 1: 69, 3: 99, 6: 129, 12: 149 }
  };

  // Convert portal name to simple key (e.g., "B1G Portal" -> "b1g")
  const slug = portalName.toLowerCase().replace(/[^a-z0-9]/g, '').replace('portal', '');
  
  // Get prices for selected portal, or use default if not found
  const prices = pricingData[slug] || { 1: 49, 3: 89, 6: 119, 12: 149 };

  // SCALING BENEFITS (So higher tiers look actually valuable)
  const plans = [
    {
      duration: "1 Month", price: prices[1], premium: false,
      features: [
        "1 Device Connection", 
        "Standard HD Quality", 
        "7,000+ Live Channels", 
        "Basic VOD Library",
        "Standard Support"
      ]
    },
    {
      duration: "3 Months", price: prices[3], premium: false,
      features: [
        "1 Device Connection", 
        "Full HD 1080p Quality", 
        "9,000+ Live Channels", 
        "Full VOD & Series",
        "Anti-Freeze Lite"
      ]
    },
    {
      duration: "6 Months", price: prices[6], premium: true, popular: true,
      features: [
        "2 Device Connections", 
        "4K Ultra HD Quality", 
        "12,000+ Live Channels", 
        "Premium Anti-Freeze",
        "Priority 24/7 Support",
        "Catch-up TV Included"
      ]
    },
    {
      duration: "12 Months", price: prices[12], premium: false,
      features: [
        "3 Device Connections", 
        "4K / 8K Ready Streams", 
        "15,000+ Live Channels", 
        "Zero Buffering Tech",
        "VIP Support Access",
        "Free Automatic Updates"
      ]
    }
  ];

  const container = document.getElementById("plansContainer");
  let html = "";
  plans.forEach((plan) => {
    html += `
      <div class="plan-card ${plan.premium ? 'premium' : ''}">
        ${plan.popular ? '<div class="popular-badge">MOST POPULAR</div>' : ''}
        <div class="plan-duration">${plan.duration}</div>
        <div class="price-block">
          <span class="currency">₹</span><span class="current-price">${plan.price}</span>
        </div>
        <ul class="features-list">
          ${plan.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
        </ul>
        <button class="btn-book" onclick="sendToTelegram('${plan.duration}', ${plan.price})">
          Select Plan
        </button>
      </div>
    `;
  });
  container.innerHTML = html;

  function sendToTelegram(duration, price) {
    const message = `🛒 *NEW IPTV ORDER*%0A📺 Portal: ${portalName}%0A📆 Plan: ${duration}%0A💰 Price: ₹${price}%0A✅ Ready for payment & instant activation.`;
    window.open(`https://t.me/IPTV_AccessBot?text=${message}`, "_blank");
  }
</script>
</body>
</html>
