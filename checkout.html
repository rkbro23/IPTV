<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Secure Checkout | RK IPTV — Encrypted Payment Gateway</title>
  <!-- Premium Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c15;
      font-family: 'Outfit', sans-serif;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- Premium animated background (glowing orbs) ---- */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: floatOrb 22s infinite alternate ease-in-out;
    }

    .orb-1 {
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, #e11d48, #3b0764);
      top: -20vh;
      left: -20vw;
      animation-duration: 28s;
    }
    .orb-2 {
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, #2563eb, #0f172a);
      bottom: -15vh;
      right: -10vw;
      animation-duration: 24s;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, #f43f5e, #4c1d95);
      top: 40vh;
      left: 60vw;
      opacity: 0.25;
      animation-duration: 32s;
      animation-delay: -10s;
    }

    @keyframes floatOrb {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(6%, 8%) scale(1.1);
      }
    }

    /* main glass card */
    .checkout-card {
      max-width: 540px;
      width: 100%;
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      border: 1px solid rgba(225, 29, 72, 0.4);
      box-shadow: 0 30px 45px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(225,29,72,0.1) inset;
      overflow: hidden;
      animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
      z-index: 2;
      transition: box-shadow 0.2s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* header */
    .checkout-header {
      padding: 1.2rem 1.5rem;
      background: rgba(8, 12, 24, 0.65);
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .back-btn {
      background: rgba(255,255,255,0.06);
      border: none;
      color: #cbd5e6;
      font-size: 1.2rem;
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 40px;
      transition: 0.25s;
    }
    .back-btn:hover {
      background: #e11d48;
      color: white;
      transform: translateX(-4px);
      box-shadow: 0 4px 10px rgba(225,29,72,0.4);
    }
    .header-title {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #ffffff, #e11d48);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    /* body */
    .checkout-body {
      padding: 1.5rem;
    }

    /* plan summary premium */
    .plan-summary {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 1.3rem;
      padding: 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
      border-left: 4px solid #e11d48;
      backdrop-filter: blur(4px);
    }
    .plan-summary .portal {
      font-size: 0.8rem;
      color: #a0afc3;
      letter-spacing: 0.3px;
    }
    .plan-summary .plan-name {
      font-weight: 800;
      font-size: 1.2rem;
      margin: 0.25rem 0;
    }
    .plan-summary .price {
      font-size: 1.7rem;
      font-weight: 900;
      color: #e11d48;
      text-shadow: 0 0 6px rgba(225,29,72,0.3);
    }

    /* method buttons */
    .methods-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 1rem 0;
    }
    .method-btn {
      background: rgba(30, 41, 59, 0.65);
      border: 1px solid #475569;
      border-radius: 1.2rem;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .method-btn i:first-child {
      font-size: 1.6rem;
      width: 2rem;
      color: #e11d48;
    }
    .method-btn:hover {
      background: #e11d48;
      border-color: #ff6080;
      transform: translateY(-3px);
      box-shadow: 0 12px 22px rgba(225, 29, 72, 0.35);
    }
    .method-btn span {
      flex: 1;
    }

    /* detail card */
    .detail-card {
      background: rgba(12, 20, 32, 0.75);
      border-radius: 1.3rem;
      padding: 1.1rem;
      margin: 1rem 0;
      backdrop-filter: blur(5px);
      border: 1px solid #2d3a5e;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 0.85rem;
    }
    .address-wrapper {
      background: #0b0f1c;
      padding: 0.7rem;
      border-radius: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      word-break: break-all;
      font-family: monospace;
      font-size: 0.73rem;
    }
    .copy-addr-btn {
      background: #2d3a5e;
      border: none;
      color: white;
      padding: 0.3rem 0.75rem;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: 0.2s;
    }
    .copy-addr-btn:hover {
      background: #e11d48;
    }
    .qr-place {
      display: flex;
      justify-content: center;
      margin: 0.8rem 0;
    }
    .qr-place img {
      max-width: 130px;
      border-radius: 1rem;
      border: 1px solid #475569;
      background: white;
      padding: 4px;
    }
    .timer {
      font-family: monospace;
      font-size: 1.3rem;
      font-weight: 800;
      background: #0b0f1c;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      color: #facc15;
    }
    .timer.expired {
      color: #e11d48;
    }
    .tx-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 0.8rem;
      border-radius: 1rem;
      color: white;
      margin: 0.5rem 0;
      font-family: 'Outfit', monospace;
      transition: all 0.2s;
    }
    .tx-input:focus {
      outline: none;
      border-color: #e11d48;
      box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.3);
    }
    .shake-error {
      animation: shake 0.4s ease-in-out 0s 2;
      border-color: #e11d48 !important;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }
    .confirm-btn {
      width: 100%;
      background: linear-gradient(135deg, #e11d48, #be123c);
      border: none;
      padding: 0.9rem;
      border-radius: 1.2rem;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .confirm-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      font-size: 0.8rem;
      cursor: pointer;
      margin-bottom: 0.8rem;
    }
    .back-link:hover {
      color: #e11d48;
    }

    /* trust footer badges */
    .trust-footer {
      margin-top: 1.4rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(71, 85, 105, 0.5);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      font-size: 0.7rem;
      color: #94a3b8;
      font-weight: 500;
    }
    .trust-footer span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.3);
      padding: 4px 10px;
      border-radius: 40px;
    }
    .status-badge {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
      font-size: 0.65rem;
      border-radius: 40px;
      padding: 3px 10px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* Modal Overlay (warning) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .warning-modal {
      background: #0f172ad9;
      border: 1px solid #e11d48;
      border-radius: 2rem;
      max-width: 380px;
      width: 90%;
      padding: 1.8rem;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 40px rgba(0,0,0,0.5);
    }
    .warning-modal i {
      font-size: 2.8rem;
      color: #e11d48;
      margin-bottom: 0.5rem;
    }
    .warning-modal h4 {
      font-size: 1.4rem;
      margin-bottom: 0.8rem;
    }
    .warning-modal p {
      font-size: 0.85rem;
      margin: 0.6rem 0;
      color: #cbd5e6;
    }
    .modal-ack {
      background: #e11d48;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      font-weight: bold;
      margin-top: 1rem;
      color: white;
      cursor: pointer;
      width: 100%;
    }
    .glow-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .loader {
      width: 38px;
      height: 38px;
      border: 3px solid #334155;
      border-top: 3px solid #e11d48;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div id="checkoutRoot" class="checkout-card">
  <div class="checkout-header">
    <button id="backHomeBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
    <div class="header-title"><i class="fas fa-shield-alt"></i> Secure Checkout</div>
  </div>
  <div class="checkout-body" id="dynamicContent">
    <div class="glow-loader"><div class="loader"></div></div>
  </div>
</div>

<!-- Modal for warning & ack -->
<div id="warningModal" class="modal-overlay">
  <div class="warning-modal">
    <i class="fas fa-exclamation-triangle"></i>
    <h4>⚠️ Manual Verification Required</h4>
    <p>Your payment details (UTR / TXN Hash) will be <strong>manually verified</strong> by our ledger team against bank/blockchain records.</p>
    <p style="color:#facc15;">❌ Fake submissions = permanent ban from RK IPTV.</p>
    <p>After acknowledgment, you'll be redirected to our support to finalize activation.</p>
    <button id="acknowledgeBtn" class="modal-ack"><i class="fas fa-check-circle"></i> Acknowledge & Continue</button>
  </div>
</div>

<script>
  // ---------- CONFIG ----------
  const JSON_URL = 'payment_data.json';
  const INR_TO_USD = 85;
  const USD_TO_BTC = 65000;

  const root = document.getElementById('dynamicContent');
  const backHomeBtn = document.getElementById('backHomeBtn');
  let urlParams = null;
  let portal = '', plan = '', priceINR = 0;
  let paymentMethods = null;
  let selectedMethodKey = null;
  let orderId = '', trackId = '';
  let timerInterval = null;
  let timeLeftSec = 600;
  let isExpired = false;
  let currentScreen = 'methods';
  
  // --- Smart Track ID Generator (TRK-YYMMDD-PortalAbbr-4CHK) ---
  function generateSmartTrackId(portalName) {
    const date = new Date();
    const yy = date.getFullYear().toString().slice(-2);
    const mm = String(date.getMonth() + 1).padStart(2,'0');
    const dd = String(date.getDate()).padStart(2,'0');
    const datePart = `${yy}${mm}${dd}`;
    let portalAbbr = portalName.replace(/[^a-zA-Z0-9]/g, '').toUpperCase().slice(0, 5);
    if (portalAbbr.length < 2) portalAbbr = "IPTV";
    const checksum = Math.random().toString(36).substring(2,6).toUpperCase();
    return `TRK-${datePart}-${portalAbbr}-${checksum}`;
  }

  function generateOrderId() {
    const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
    const ts = Date.now().toString(36).slice(-4).toUpperCase();
    return `RK-${rand}${ts}`;
  }

  function formatConvertedAmount(method, inr) {
    const usd = inr / INR_TO_USD;
    if (method === 'UPI') return `₹${inr}`;
    if (method === 'USDT_TRC20') return `$${usd.toFixed(2)} USDT (TRC20)`;
    if (method === 'EPAY') return `$${usd.toFixed(2)} (Epay/Card)`;
    if (method === 'BTC') {
      const btc = usd / USD_TO_BTC;
      return `${btc.toFixed(8)} BTC`;
    }
    return `₹${inr}`;
  }

  // --- Strict TXN validation ---
  function validateTransactionId(methodKey, txnId) {
    const trimmed = txnId.trim();
    if (!trimmed) return false;
    if (methodKey === 'UPI') {
      return /^\d{12}$/.test(trimmed);
    } else if (methodKey === 'USDT_TRC20' || methodKey === 'BTC') {
      // crypto hash: alphanumeric, length between 60 and 128 (strict bitcoin/trc20 style)
      return /^[A-Fa-f0-9]{60,128}$/.test(trimmed);
    } else if (methodKey === 'EPAY') {
      // generic but min 5 chars alphanumeric + dash allowed
      return /^[A-Za-z0-9\-]{5,30}$/.test(trimmed);
    }
    return false;
  }

  function showShakeError(inputEl, msg) {
    const errDiv = document.getElementById('txError');
    if (errDiv) errDiv.innerText = `❌ ${msg}`;
    if (inputEl) {
      inputEl.classList.add('shake-error');
      setTimeout(() => inputEl.classList.remove('shake-error'), 600);
    }
  }

  // Timer functions
  function stopTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = null; }
  function updateTimerDisplay(displayEl) {
    if (!displayEl) return;
    const mins = Math.floor(timeLeftSec / 60);
    const secs = timeLeftSec % 60;
    displayEl.innerText = timeLeftSec <= 0 ? 'EXPIRED' : `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    if (timeLeftSec <= 0 && displayEl.classList) displayEl.classList.add('expired');
  }
  function startTimer(displayEl) {
    stopTimer();
    timeLeftSec = 600;
    isExpired = false;
    updateTimerDisplay(displayEl);
    timerInterval = setInterval(() => {
      if (timeLeftSec > 0) {
        timeLeftSec--;
        updateTimerDisplay(displayEl);
      } else {
        clearInterval(timerInterval);
        timerInterval = null;
        isExpired = true;
        updateTimerDisplay(displayEl);
        const txInput = document.getElementById('txnInput');
        const confirmBtn = document.getElementById('confirmPayBtn');
        if (txInput) txInput.disabled = true;
        if (confirmBtn) confirmBtn.disabled = true;
        if (displayEl) displayEl.classList.add('expired');
      }
    }, 1000);
  }

  // Render methods screen
  function renderMethodScreen() {
    if (!paymentMethods) return;
    let methodsHtml = '';
    for (const [key, mData] of Object.entries(paymentMethods)) {
      let icon = '';
      if (key === 'UPI') icon = '<i class="fas fa-mobile-alt"></i>';
      else if (key === 'USDT_TRC20') icon = '<i class="fab fa-usdt"></i>';
      else if (key === 'BTC') icon = '<i class="fab fa-bitcoin"></i>';
      else if (key === 'EPAY') icon = '<i class="fas fa-credit-card"></i>';
      else icon = '<i class="fas fa-qrcode"></i>';
      methodsHtml += `
        <div class="method-btn" data-method="${key}">
          ${icon}
          <span>${escapeHtml(mData.method_name)}</span>
          <i class="fas fa-chevron-right" style="font-size: 0.9rem;"></i>
        </div>
      `;
    }
    const summaryHtml = `
      <div class="plan-summary">
        <div class="portal"><i class="fas fa-tv"></i> ${escapeHtml(portal)}</div>
        <div class="plan-name">${escapeHtml(plan)}</div>
        <div class="price">₹${priceINR}</div>
      </div>
      <div class="methods-list" id="methodsContainer">${methodsHtml}</div>
      <div class="trust-footer">
        <span><i class="fas fa-lock"></i> 256-Bit SSL Encrypted Checkout</span>
        <span><i class="fas fa-cloud-upload-alt"></i> Protected by Cloudflare Security</span>
        <span><i class="fas fa-book"></i> Verified Merchant Ledger</span>
      </div>
    `;
    root.innerHTML = summaryHtml;
    document.querySelectorAll('.method-btn').forEach(btn => {
      btn.addEventListener('click', () => { goToDetailsScreen(btn.getAttribute('data-method')); });
    });
  }

  // Detail screen (payment)
  async function goToDetailsScreen(methodKey) {
    selectedMethodKey = methodKey;
    const methodData = paymentMethods[methodKey];
    if (!methodData) return;
    orderId = generateOrderId();
    trackId = generateSmartTrackId(portal);
    const address = methodData.address_or_id;
    const qrUrl = methodData.qr_url || '';
    const networkInfo = methodData.network_info || '';
    const convertedAmount = formatConvertedAmount(methodKey, priceINR);
    const methodDisplayName = methodData.method_name;
    
    let buttonText = '<i class="fas fa-lock"></i> Verify & Submit';
    if (methodKey === 'UPI') buttonText = '<i class="fas fa-lock"></i> Verify UTR & Activate';
    else if (methodKey === 'USDT_TRC20' || methodKey === 'BTC') buttonText = '<i class="fas fa-lock"></i> Verify Blockchain Hash';
    else buttonText = '<i class="fas fa-lock"></i> Verify Payment';
    
    const detailHtml = `
      <div class="back-link" id="backToMethodsBtn"><i class="fas fa-arrow-left"></i> Change payment method</div>
      <div class="plan-summary" style="padding:0.6rem;">
        <div class="plan-name">${escapeHtml(plan)}</div>
        <div class="price">₹${priceINR}</div>
      </div>
      <div class="detail-card">
        <div class="info-row"><span>💰 Amount to pay:</span><strong>${convertedAmount}</strong></div>
        <div class="info-row"><span>💳 Method:</span><strong>${escapeHtml(methodDisplayName)}</strong></div>
        <div class="info-row"><span>🏦 Address / ID:</span></div>
        <div class="address-wrapper">
          <span id="paymentAddressSpan">${escapeHtml(address)}</span>
          <div class="tooltip" style="position:relative;">
            <button class="copy-addr-btn" id="copyAddressBtn"><i class="far fa-copy"></i> Copy</button>
            <span class="tooltiptext" style="position:absolute; bottom:130%; background:#e11d48;">Copy</span>
          </div>
        </div>
        ${networkInfo ? `<div class="info-row"><span>📡 Network:</span><small>${escapeHtml(networkInfo)}</small></div>` : ''}
        <div class="qr-place">${qrUrl ? `<img src="${escapeHtml(qrUrl)}" alt="QR" onerror="this.style.display='none'">` : '<small>QR not available</small>'}</div>
        <div class="info-row"><span>⏱️ Time left:</span><span class="timer" id="timerSpan">10:00</span></div>
        <div class="info-row"><span>🆔 Order ID:</span><strong>${orderId}</strong></div>
        <div class="info-row"><span>🔢 Track ID:</span><strong>${trackId}</strong> <span class="status-badge"><i class="fas fa-clock"></i> Awaiting Network Confirmation</span></div>
      </div>
      <div>
        <label>Transaction ID / UTR / Hash <span style="color:#e11d48;">*</span></label>
        <input type="text" id="txnInput" class="tx-input" placeholder="${
          methodKey === 'UPI' ? '12-digit UTR (e.g., 123456789012)' : (methodKey.includes('USDT')||methodKey==='BTC') ? 'Blockchain TX Hash (64+ hex chars)' : 'Transaction reference / ID'
        }">
        <div id="txError" style="color:#f43f5e; font-size:0.7rem; margin-top:4px;"></div>
      </div>
      <button id="confirmPayBtn" class="confirm-btn">${buttonText}</button>
      <div class="trust-footer" style="margin-top:1rem;">
        <span><i class="fas fa-shield-alt"></i> Real-time Hash Validation</span>
        <span><i class="fas fa-hand-holding-usd"></i> Manual Anti-Fraud Ledger</span>
      </div>
    `;
    root.innerHTML = detailHtml;
    document.getElementById('backToMethodsBtn').addEventListener('click', () => { stopTimer(); currentScreen = 'methods'; renderMethodScreen(); });
    document.getElementById('copyAddressBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('paymentAddressSpan').innerText);
      const tip = document.querySelector('.tooltiptext');
      if(tip) { tip.innerText = 'Copied!'; setTimeout(() => tip.innerText = 'Copy', 1500); }
    });
    const timerSpan = document.getElementById('timerSpan');
    startTimer(timerSpan);
    const confirmBtn = document.getElementById('confirmPayBtn');
    const txnInput = document.getElementById('txnInput');
    confirmBtn.addEventListener('click', () => handleSecurePaymentFlow(txnInput));
    currentScreen = 'details';
  }

  // ---- NEW SECURE FLOW: Validation -> Loading 3 sec -> Warning Modal -> Redirect ----
  let isProcessing = false;
  function handleSecurePaymentFlow(txnInput) {
    if (isProcessing) return;
    if (isExpired || timeLeftSec <= 0) {
      alert('⏰ Payment session expired. Please go back and select method again.');
      return;
    }
    const rawTxn = txnInput.value.trim();
    if (!rawTxn) {
      showShakeError(txnInput, 'Transaction ID / UTR / Hash is required');
      return;
    }
    if (!validateTransactionId(selectedMethodKey, rawTxn)) {
      let msg = '';
      if (selectedMethodKey === 'UPI') msg = 'Invalid UTR. Must be exactly 12 digits numeric.';
      else if (selectedMethodKey === 'USDT_TRC20' || selectedMethodKey === 'BTC') msg = 'Invalid blockchain hash: must be 60-128 alphanumeric characters (hex).';
      else msg = 'Invalid Transaction ID format.';
      showShakeError(txnInput, msg);
      return;
    }
    // Clear any error
    const errDiv = document.getElementById('txError');
    if (errDiv) errDiv.innerText = '';
    isProcessing = true;
    const confirmBtn = document.getElementById('confirmPayBtn');
    const originalText = confirmBtn.innerHTML;
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Searching Network Ledger...';
    
    // simulate 3 seconds ledger search
    setTimeout(() => {
      // build telegram url + show modal
      const converted = formatConvertedAmount(selectedMethodKey, priceINR);
      let methodLabel = selectedMethodKey;
      if (selectedMethodKey === 'USDT_TRC20') methodLabel = 'USDT (TRC20)';
      else if (selectedMethodKey === 'EPAY') methodLabel = 'Epay/Card';
      const txnIdFinal = rawTxn;
      const message = `🛒 *NEW PAYMENT VERIFICATION*%0A%0A📺 Portal: ${portal}%0A📆 Plan: ${plan}%0A💰 Base Amount: ₹${priceINR}%0A💱 Paid As: ${converted}%0A🏦 Method: ${methodLabel}%0A%0A🆔 Order ID: ${orderId}%0A🔢 Track ID: ${trackId}%0A✅ *User TXN ID:* ${txnIdFinal}%0A%0A🔗 Please verify and issue MAC.`;
      const tgUrl = `https://t.me/nubcarder?text=${encodeURIComponent(message)}`;
      
      // Show modal after loading (manual ack)
      const modal = document.getElementById('warningModal');
      modal.classList.add('active');
      const ackBtn = document.getElementById('acknowledgeBtn');
      const redirectHandler = () => {
        modal.classList.remove('active');
        window.location.href = tgUrl;
      };
      ackBtn.removeEventListener('click', redirectHandler);
      ackBtn.addEventListener('click', redirectHandler, { once: true });
      // optional cancel on modal background?
      modal.addEventListener('click', (e) => { if (e.target === modal) { /* do nothing, force ack */ } });
      
      confirmBtn.disabled = false;
      confirmBtn.innerHTML = originalText;
      isProcessing = false;
    }, 3000);
  }

  function showError(errMsg) {
    root.innerHTML = `
      <div class="error-state" style="text-align:center;padding:2rem;">
        <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#e11d48;"></i>
        <h3>${escapeHtml(errMsg)}</h3>
        <button id="errorGoBack" class="confirm-btn" style="background:#334155;">Go Back</button>
      </div>
    `;
    document.getElementById('errorGoBack')?.addEventListener('click', () => window.location.href = 'plan.html');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    portal = params.get('portal');
    plan = params.get('plan');
    const priceParam = params.get('price');
    if (!portal || !plan || !priceParam || isNaN(parseFloat(priceParam))) {
      showError('Invalid Checkout Session — missing params');
      return;
    }
    priceINR = parseInt(priceParam, 10);
    try {
      const res = await fetch(JSON_URL);
      if (!res.ok) throw new Error('Payment data fetch failed');
      paymentMethods = await res.json();
      if (!paymentMethods.UPI || !paymentMethods.USDT_TRC20 || !paymentMethods.BTC || !paymentMethods.EPAY) {
        throw new Error('Incomplete payment methods');
      }
      renderMethodScreen();
    } catch (err) {
      console.error(err);
      showError('Payment gateway configuration error. Please contact support.');
    }
  }
  backHomeBtn.addEventListener('click', () => { window.location.href = 'plan.html'; });
  init();
</script>
</body>
</html>
