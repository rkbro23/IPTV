<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Secure Checkout | RK IPTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f1c;
      font-family: 'Inter', sans-serif;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* premium glassmorphic container */
    .checkout-card {
      max-width: 520px;
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(225, 29, 72, 0.3);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* header */
    .checkout-header {
      padding: 1.2rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .back-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: 0.2s;
    }
    .back-btn:hover {
      background: #e11d48;
      color: white;
      transform: translateX(-3px);
    }
    .header-title {
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #fff, #e11d48);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* body */
    .checkout-body {
      padding: 1.5rem;
    }

    /* plan summary */
    .plan-summary {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 1.2rem;
      padding: 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
      border-left: 3px solid #e11d48;
    }
    .plan-summary .portal {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .plan-summary .plan-name {
      font-weight: 800;
      font-size: 1.2rem;
      margin: 0.2rem 0;
    }
    .plan-summary .price {
      font-size: 1.6rem;
      font-weight: 900;
      color: #e11d48;
    }

    /* method buttons */
    .methods-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1rem 0;
    }
    .method-btn {
      background: rgba(51, 65, 85, 0.7);
      border: 1px solid #475569;
      border-radius: 1.2rem;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .method-btn i {
      font-size: 1.6rem;
      width: 2rem;
      color: #e11d48;
    }
    .method-btn:hover {
      background: #e11d48;
      border-color: #e11d48;
      transform: translateY(-4px);
      box-shadow: 0 12px 20px rgba(225, 29, 72, 0.25);
    }
    .method-btn span {
      flex: 1;
    }

    /* detail screen */
    .detail-card {
      background: rgba(15, 23, 42, 0.7);
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1rem 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 0.85rem;
    }
    .address-wrapper {
      background: #0b0f1c;
      padding: 0.6rem;
      border-radius: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      word-break: break-all;
      font-family: monospace;
      font-size: 0.75rem;
    }
    .copy-addr-btn {
      background: #334155;
      border: none;
      color: white;
      padding: 0.3rem 0.7rem;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: 0.2s;
    }
    .copy-addr-btn:hover {
      background: #e11d48;
    }
    .qr-place {
      display: flex;
      justify-content: center;
      margin: 0.8rem 0;
    }
    .qr-place img {
      max-width: 140px;
      border-radius: 1rem;
      border: 1px solid #475569;
      background: white;
      padding: 4px;
    }
    .timer {
      font-family: monospace;
      font-size: 1.3rem;
      font-weight: 800;
      background: #0b0f1c;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      color: #facc15;
    }
    .timer.expired {
      color: #e11d48;
    }
    .tx-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 0.7rem;
      border-radius: 1rem;
      color: white;
      margin: 0.5rem 0;
    }
    .confirm-btn {
      width: 100%;
      background: linear-gradient(135deg, #e11d48, #be123c);
      border: none;
      padding: 0.9rem;
      border-radius: 1.2rem;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: 0.2s;
    }
    .confirm-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #94a3b8;
      font-size: 0.8rem;
      cursor: pointer;
      margin-bottom: 0.8rem;
    }
    .back-link:hover {
      color: #e11d48;
    }
    .error-state {
      text-align: center;
      padding: 2rem;
    }
    .glow-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top: 3px solid #e11d48;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .tooltip {
      position: relative;
      display: inline-block;
    }
    .tooltip .tooltiptext {
      visibility: hidden;
      background-color: #e11d48;
      color: #fff;
      text-align: center;
      border-radius: 6px;
      padding: 2px 6px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.7rem;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
    }
    hr {
      border-color: #334155;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
<div id="checkoutRoot" class="checkout-card">
  <div class="checkout-header">
    <button id="backHomeBtn" class="back-btn"><i class="fas fa-arrow-left"></i></button>
    <div class="header-title"><i class="fas fa-shield-alt"></i> Secure Checkout</div>
  </div>
  <div class="checkout-body" id="dynamicContent">
    <!-- loading state -->
    <div class="glow-loader"><div class="loader"></div></div>
  </div>
</div>

<script>
  // ---------- CONFIG ----------
  const JSON_URL = 'payment_data.json';  // must be in same folder
  const INR_TO_USD = 85;
  const USD_TO_BTC = 65000;

  // DOM elements
  const root = document.getElementById('dynamicContent');
  const backHomeBtn = document.getElementById('backHomeBtn');

  // Global state
  let urlParams = null;
  let portal = '', plan = '', priceINR = 0;
  let paymentMethods = null;        // cached JSON
  let selectedMethodKey = null;     // 'UPI', 'USDT_TRC20', 'BTC', 'EPAY'
  let orderId = '', trackId = '';
  let timerInterval = null;
  let timeLeftSec = 600;
  let isExpired = false;

  // Screen state
  let currentScreen = 'methods';   // 'methods' or 'details'

  // Helper: generate IDs
  function generateOrderId() {
    const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
    const ts = Date.now().toString(36).slice(-3).toUpperCase();
    return `RK-${rand}${ts}`;
  }
  function generateTrackId() {
    return Math.floor(10000000 + Math.random() * 90000000).toString();
  }

  // format currency
  function formatConvertedAmount(method, inr) {
    const usd = inr / INR_TO_USD;
    if (method === 'UPI') return `₹${inr}`;
    if (method === 'USDT_TRC20') return `$${usd.toFixed(2)} USDT`;
    if (method === 'EPAY') return `$${usd.toFixed(2)} (Epay)`;
    if (method === 'BTC') {
      const btc = usd / USD_TO_BTC;
      return `${btc.toFixed(8)} BTC`;
    }
    return `₹${inr}`;
  }

  // Timer functions
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
  }

  function startTimer(displayEl) {
    stopTimer();
    timeLeftSec = 600;
    isExpired = false;
    updateTimerDisplay(displayEl);
    timerInterval = setInterval(() => {
      if (timeLeftSec > 0) {
        timeLeftSec--;
        updateTimerDisplay(displayEl);
      } else {
        // expired
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        isExpired = true;
        updateTimerDisplay(displayEl);
        // disable input & confirm button
        const txInput = document.getElementById('txnInput');
        const confirmBtn = document.getElementById('confirmPayBtn');
        if (txInput) txInput.disabled = true;
        if (confirmBtn) confirmBtn.disabled = true;
        const timerSpan = document.getElementById('timerSpan');
        if (timerSpan) timerSpan.classList.add('expired');
      }
    }, 1000);
  }

  function updateTimerDisplay(displayEl) {
    if (!displayEl) return;
    const mins = Math.floor(timeLeftSec / 60);
    const secs = timeLeftSec % 60;
    displayEl.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    if (timeLeftSec <= 0) {
      displayEl.innerText = 'EXPIRED';
      if (displayEl.classList) displayEl.classList.add('expired');
    } else {
      if (displayEl.classList) displayEl.classList.remove('expired');
    }
  }

  // Screen 1: Render method selection
  function renderMethodScreen() {
    if (!paymentMethods) return;
    const methodsList = Object.keys(paymentMethods);
    let methodsHtml = '';
    methodsList.forEach(key => {
      let icon = '';
      if (key === 'UPI') icon = '<i class="fas fa-mobile-alt"></i>';
      else if (key === 'USDT_TRC20') icon = '<i class="fab fa-usdt"></i>';
      else if (key === 'BTC') icon = '<i class="fab fa-bitcoin"></i>';
      else if (key === 'EPAY') icon = '<i class="fas fa-credit-card"></i>';
      else icon = '<i class="fas fa-qrcode"></i>';
      methodsHtml += `
        <div class="method-btn" data-method="${key}">
          ${icon}
          <span>${paymentMethods[key].method_name}</span>
          <i class="fas fa-chevron-right" style="font-size: 0.9rem;"></i>
        </div>
      `;
    });

    const summaryHtml = `
      <div class="plan-summary">
        <div class="portal"><i class="fas fa-tv"></i> ${escapeHtml(portal)}</div>
        <div class="plan-name">${escapeHtml(plan)}</div>
        <div class="price">₹${priceINR}</div>
      </div>
      <div class="methods-list" id="methodsContainer">
        ${methodsHtml}
      </div>
      <p style="font-size:0.7rem; text-align:center; margin-top:1rem; color:#64748b;">
        <i class="fas fa-lock"></i> Secured by RK IPTV
      </p>
    `;
    root.innerHTML = summaryHtml;
    // attach event listeners to method buttons
    document.querySelectorAll('.method-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const method = btn.getAttribute('data-method');
        if (method) goToDetailsScreen(method);
      });
    });
  }

  // Screen 2: Payment details for selected method
  async function goToDetailsScreen(methodKey) {
    selectedMethodKey = methodKey;
    const methodData = paymentMethods[methodKey];
    if (!methodData) return;

    // generate order details
    orderId = generateOrderId();
    trackId = generateTrackId();

    // fetch QR & address
    const address = methodData.address_or_id;
    const qrUrl = methodData.qr_url || '';
    const networkInfo = methodData.network_info || '';

    const convertedAmount = formatConvertedAmount(methodKey, priceINR);
    const methodDisplayName = methodData.method_name;

    const detailHtml = `
      <div class="back-link" id="backToMethodsBtn"><i class="fas fa-arrow-left"></i> Change payment method</div>
      <div class="plan-summary" style="padding:0.6rem;">
        <div class="plan-name">${escapeHtml(plan)}</div>
        <div class="price">₹${priceINR}</div>
      </div>
      <div class="detail-card">
        <div class="info-row"><span>💰 Amount to pay:</span><strong>${convertedAmount}</strong></div>
        <div class="info-row"><span>💳 Method:</span><strong>${escapeHtml(methodDisplayName)}</strong></div>
        <div class="info-row"><span>🏦 Address / ID:</span></div>
        <div class="address-wrapper">
          <span id="paymentAddressSpan">${escapeHtml(address)}</span>
          <div class="tooltip">
            <button class="copy-addr-btn" id="copyAddressBtn"><i class="far fa-copy"></i> Copy</button>
            <span class="tooltiptext" id="copyTooltip">Copy</span>
          </div>
        </div>
        ${networkInfo ? `<div class="info-row"><span>📡 Network:</span><small>${escapeHtml(networkInfo)}</small></div>` : ''}
        <div class="qr-place">
          ${qrUrl ? `<img src="${escapeHtml(qrUrl)}" alt="QR Code" onerror="this.style.display='none'">` : '<small>QR not available</small>'}
        </div>
        <div class="info-row"><span>⏱️ Time left:</span><span class="timer" id="timerSpan">10:00</span></div>
        <div class="info-row"><span>🆔 Order ID:</span><strong>${orderId}</strong></div>
        <div class="info-row"><span>🔢 Track ID:</span><strong>${trackId}</strong></div>
      </div>
      <div>
        <label>Transaction ID / UTR / Hash <span style="color:#e11d48;">*</span></label>
        <input type="text" id="txnInput" class="tx-input" placeholder="e.g. 1234567890, TXNID123, 0x7aB...">
        <div id="txError" style="color:#f43f5e; font-size:0.7rem;"></div>
      </div>
      <button id="confirmPayBtn" class="confirm-btn"><i class="fab fa-telegram-plane"></i> I Have Paid</button>
    `;
    root.innerHTML = detailHtml;

    // attach back button
    document.getElementById('backToMethodsBtn').addEventListener('click', () => {
      stopTimer();
      currentScreen = 'methods';
      renderMethodScreen();
    });

    // copy address logic
    const copyBtn = document.getElementById('copyAddressBtn');
    const addressSpan = document.getElementById('paymentAddressSpan');
    const tooltipSpan = document.getElementById('copyTooltip');
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(addressSpan.innerText);
      tooltipSpan.innerText = 'Copied!';
      setTimeout(() => { tooltipSpan.innerText = 'Copy'; }, 1500);
    });

    // start timer
    const timerSpanEl = document.getElementById('timerSpan');
    startTimer(timerSpanEl);

    // attach confirm button
    const confirmBtn = document.getElementById('confirmPayBtn');
    const txnInput = document.getElementById('txnInput');
    confirmBtn.addEventListener('click', () => handlePaymentConfirmation(txnInput));
    currentScreen = 'details';
  }

  async function handlePaymentConfirmation(txnInput) {
    if (isExpired || timeLeftSec <= 0) {
      alert('⏰ Payment session has expired. Please go back and select method again.');
      return;
    }
    const txnId = txnInput.value.trim();
    if (txnId.length < 5) {
      const errDiv = document.getElementById('txError');
      if (errDiv) errDiv.innerText = '❌ Please enter a valid Transaction ID (min 5 characters)';
      return;
    }
    const confirmBtn = document.getElementById('confirmPayBtn');
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';

    // build message
    const converted = formatConvertedAmount(selectedMethodKey, priceINR);
    let methodLabel = selectedMethodKey;
    if (selectedMethodKey === 'USDT_TRC20') methodLabel = 'USDT (TRC20)';
    else if (selectedMethodKey === 'EPAY') methodLabel = 'Epay/Card';

    const message = `🛒 *NEW PAYMENT VERIFICATION*%0A%0A📺 Portal: ${portal}%0A📆 Plan: ${plan}%0A💰 Base Amount: ₹${priceINR}%0A💱 Paid As: ${converted}%0A🏦 Method: ${methodLabel}%0A%0A🆔 Order ID: ${orderId}%0A✅ *User TXN ID:* ${txnId}%0A%0A🔗 Please verify and issue MAC.`;

    const encoded = encodeURIComponent(message);
    const tgUrl = `https://t.me/nubcarder?text=${encoded}`;
    window.location.href = tgUrl;
  }

  // Error state
  function showError(errMsg) {
    root.innerHTML = `
      <div class="error-state">
        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color:#e11d48;"></i>
        <h3 style="margin: 1rem 0;">${escapeHtml(errMsg)}</h3>
        <button id="errorGoBack" class="confirm-btn" style="background:#334155;">Go Back</button>
      </div>
    `;
    document.getElementById('errorGoBack')?.addEventListener('click', () => {
      window.location.href = 'plan.html';
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Initialize: parse URL params + fetch JSON
  async function init() {
    const params = new URLSearchParams(window.location.search);
    portal = params.get('portal');
    plan = params.get('plan');
    const priceParam = params.get('price');
    if (!portal || !plan || !priceParam || isNaN(parseFloat(priceParam))) {
      showError('Invalid Checkout Session');
      return;
    }
    priceINR = parseInt(priceParam, 10);
    // fetch json
    try {
      const res = await fetch(JSON_URL);
      if (!res.ok) throw new Error('Failed to load payment data');
      paymentMethods = await res.json();
      // validate structure
      if (!paymentMethods.UPI || !paymentMethods.USDT_TRC20 || !paymentMethods.BTC || !paymentMethods.EPAY) {
        throw new Error('Missing payment methods in JSON');
      }
      // render method selection
      renderMethodScreen();
    } catch (err) {
      console.error(err);
      showError('Payment data could not be loaded. Please try again later.');
    }
  }

  // back button (top-left) returns to plan.html
  backHomeBtn.addEventListener('click', () => {
    window.location.href = 'plan.html';
  });

  init();
</script>
</body>
  </html>
